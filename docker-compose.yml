# Full local stack. `docker compose up` brings up infra + api + worker + web.
# Host ports 5433 (pg) and 6380 (redis) are remapped to avoid clashing with a
# native Postgres/Redis some dev machines already run — see docs/CONTEXT.md.
#
# Common env shared by api + worker + migrate, anchored here to avoid drift.
x-api-env: &api-env
  NODE_ENV: development
  DATABASE_URL: postgresql://tele:tele@postgres:5432/tele
  REDIS_URL: redis://redis:6379
  SESSION_JWT_SECRET: docker-compose-session-secret-change-me
  VISITOR_JWT_SECRET: docker-compose-visitor-secret-change-me
  WEB_ORIGIN: http://localhost:5173
  COOKIE_SECURE: "false"
  EMAIL_DOMAIN: tele.local
  SMTP_HOST: maildev
  SMTP_PORT: "1025"
  ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
  ANTHROPIC_MODEL: claude-haiku-4-5
  # AI summarization via a local Ollama on the host. When set it takes priority
  # over Anthropic (no API key/network needed). host.docker.internal reaches the
  # host from inside the container; override the model with OLLAMA_MODEL. Set
  # OLLAMA_BASE_URL="" to disable and fall back to Anthropic/stub.
  OLLAMA_BASE_URL: "${OLLAMA_BASE_URL-http://host.docker.internal:11434}"
  OLLAMA_MODEL: "${OLLAMA_MODEL:-llama3.2}"
  KB_CNAME_TARGET: kb.tele.local
  DOMAIN_VERIFICATION_DEV_BYPASS: "true"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tele
      POSTGRES_PASSWORD: tele
      POSTGRES_DB: tele
    ports:
      - "5433:5432"
    volumes:
      - tele_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tele"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  maildev:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - "1080:1080" # web UI
      - "1025:1025" # SMTP

  # One-shot: apply migrations + seed demo data, then exit. api/worker wait on it.
  migrate:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment: *api-env
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run prisma:migrate --workspace @tele/api && npm run seed --workspace @tele/api"

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment: *api-env
    # Lets host.docker.internal (Ollama on the host) resolve on Linux too;
    # Docker Desktop (macOS/Windows) provides it automatically.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: npm run start --workspace @tele/api

  worker:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    environment: *api-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: npm run start:worker --workspace @tele/api

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    environment:
      API_PROXY_TARGET: http://api:4000
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  tele_postgres_data:
